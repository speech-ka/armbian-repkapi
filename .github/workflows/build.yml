name: Build RepkaPi Armbian
on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Kernel branch (current, legacy, edge)'
        required: true
        default: 'current'
      release:
        description: 'OS Release (jammy, bookworm)'
        required: true
        default: 'jammy'

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Maximize build space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"

      - name: Checkout this repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build Armbian Image
        run: |
          sudo ./compile.sh build BOARD=repkapi3 BRANCH=${{ github.event.inputs.branch }} RELEASE=${{ github.event.inputs.release }} BUILD_MINIMAL=no BUILD_DESKTOP=no KERNEL_CONFIGURE=no

      - name: Prepare Artifacts
        run: |
          mkdir -p deploy
          cp output/images/*.img.xz deploy/ || cp output/images/*.7z deploy/ || cp output/images/*.img deploy/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: deploy/*
          tag_name: build-${{ github.run_id }}
          name: RepkaPi Armbian Build ${{ github.run_id }}
          body: |
            Armbian build for RepkaPi 3.
            Branch: ${{ github.event.inputs.branch }}
            Release: ${{ github.event.inputs.release }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
